# markdownlint-cli2 配置 —— Craftx-books VitePress 站点
#
# 设计原则:
# - 只管"纯格式"(空格/空行/换行/缩进),不碰结构(标题层级/首行 H1)和内容(代码语言/裸 HTML)
# - 结构性规则(MD001/MD025/MD041)关闭:中文小册源(EPUB/掘金)标题结构已定,589 文件无 H1、28 文件多 H1
# - MD033 行内 HTML 关闭:VitePress 组件 <HomePage/> + 掘金/EPUB 残留的 <p align=center><img> 等大量出现
# - MD013 行长关闭:中文排版行长无意义
# - MD040 代码块语言:默认关闭(书源无语言块多),已由 scripts/fix-codeblock-lang.mjs 批量补全(813→1)

config:
  default: true

  # === 关闭:结构性 / 中文场景不适用的规则 ===
  MD001: false   # heading-increment: 书源跳级严重(如直接 ### 开头)
  MD013: false   # line-length: 中文行长无意义
  MD025: false   # single-h1: 28 个文件多 H1(掘金小册原始结构)
  MD033: false   # no-inline-html: VitePress 组件 + 掘金/EPUB 残留 HTML
  MD034: false   # no-bare-urls: 有 <https://> autolink
  MD041: false   # first-line-heading: 589 文件无 H1(标题在文件名里)

  # === 关闭:书源风格 / 内容治理类(记入 README TODO)===
  MD029: false   # ol-prefix: 书里有意的章节编号重置(1. 2. 3. 反复),非作者错误
  MD036: false   # no-emphasis-as-heading: 中文书用 **xxx** 作小标题是常见写法
  MD040: false   # fenced-code-language: 已由 fix-codeblock-lang.mjs 批量补全(813→1),规则仍关(残留/新导入需重跑脚本)
  MD045: false   # no-alt-text: 1354 处图片空 alt,EPUB/掘金迁移残留,需语义补全,记 TODO
  MD046: false   # code-block-style: 书源用缩进式代码块,统一改 fenced 风险高
  MD055: false   # table-pipe-style: 表格管道风格不一致,可读性无影响
  MD028: false   # no-blanks-blockquote: FAQ 问答间有意空行分隔(career-guide/01 等)
  MD003: false   # heading-style: 书源评论区用 ---- 作分隔线被误判为 setext 标题
  MD056: false   # table-column-count: TypeScript 泛型 string | string[] 里的转义 \| 被误算列数
  MD024: false   # no-duplicate-heading: 书源不同章节同名小标题(如"实现过程/绑定事件")
  MD042: false   # no-empty-links: 书源迁移残留的孤例坏链接 [url]()
  MD053: false   # link-image-reference-definitions: 书源迁移残留的未用引用定义

  # === 放宽:中文标点场景 ===
  MD026:
    punctuation: ".,;:!。，；：！"   # 包含中文标点,避免误报中文标题

  # === 保留开启:纯格式规则 ===
  # MD009 trailing-spaces / MD010 no-hard-tabs / MD012 no-multiple-blanks
  # MD022 blanks-around-headings / MD030 list-indent
  # MD031 blanks-around-fences / MD032 blanks-around-lists / MD047 single-trailing-newline

globs:
  - "**/*.md"

ignores:
  - "node_modules/**"
  - "dist/**"
  - "docs/.vitepress/dist/**"
  - "docs/.vitepress/cache/**"
  # 顶层中文源归档目录(已被 .gitignore 忽略,保险起见显式排除)
  - "Claude Code 企业级全链路开发实战/**"
  - "Claude_Code企业级老项目改造实战/**"
  - "MySQL 是怎样运行的:从根儿上理解 MySQL/**"
  - "TypeScript 入门教程/**"
  - "TypeScript全面进阶指南/**"
  - "从 0 打造通用型低代码产品/**"
  - "从0到1实现一套CI_CD流程/**"
  - "你不知道的 Chrome 调试技巧/**"
  - "开发者必备的 Docker 实践指南/**"
  - "微信小程序开发入门:从 0 到 1 实现天气小程序/**"
  - "程序员的必修课/**"
  - "程序员职业小白书 —— 如何规划和经营你的职业/**"
  - "许式伟的架构课/**"
  - "说透Redis7/**"
